name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION_DEFAULT: "3.12"
  MIN_COVERAGE: 90
  MIN_BRANCH_COVERAGE: 85
  MIN_DOCSTRING_COVERAGE: 95

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov pytest-xdist pytest-timeout
          pip install ruff pylint mypy bandit pip-audit
          pip install interrogate coverage-badge

      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github --exit-non-zero-on-fix
        continue-on-error: false

      - name: Run Ruff formatter check
        run: |
          ruff format --check .
        continue-on-error: false

      - name: Run Pylint
        run: |
          pylint $(git ls-files '*.py') --exit-zero --output-format=colorized --reports=y --score=y
        continue-on-error: false

      - name: Run MyPy type checking
        run: |
          mypy . --install-types --non-interactive --ignore-missing-imports --show-error-codes --pretty
        continue-on-error: false

      - name: Check docstring coverage
        run: |
          interrogate -v --fail-under=${{ env.MIN_DOCSTRING_COVERAGE }} --ignore-init-method --ignore-init-module --ignore-magic --ignore-nested-functions .
        continue-on-error: false

      - name: Run Bandit security scanner
        run: |
          bandit -r . -f json -o bandit-report.json --exit-zero
          bandit -r . -f screen --severity-level medium
        continue-on-error: false

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ matrix.python-version }}
          path: bandit-report.json
          retention-days: 30

      - name: Run pip-audit for dependency vulnerabilities
        run: |
          pip-audit --desc --format json --output pip-audit-report.json || true
          pip-audit --desc
        continue-on-error: false

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report-${{ matrix.python-version }}
          path: pip-audit-report.json
          retention-days: 30

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=yerba_mate_reduction \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            --junitxml=pytest-report.xml \
            --verbose \
            --tb=short \
            --timeout=300
        continue-on-error: false

      - name: Check branch coverage
        run: |
          coverage report --fail-under=${{ env.MIN_BRANCH_COVERAGE }}
        continue-on-error: false

      - name: Generate coverage badge
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        run: |
          coverage-badge -o coverage-badge.svg -f

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
            coverage-badge.svg
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: pytest-report.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-python-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.python-version == env.PYTHON_VERSION_DEFAULT
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: ${{ env.MIN_COVERAGE }}
          MINIMUM_ORANGE: 80

  complexity:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install complexity tools
        run: |
          pip install radon xenon

      - name: Run Radon complexity analysis
        run: |
          radon cc . -a -nb --json > radon-cc-report.json
          radon cc . -a -nb --show-complexity
          radon mi . --json > radon-mi-report.json
          radon mi . --show

      - name: Run Xenon complexity check
        run: |
          xenon --max-absolute B --max-modules B --max-average A . || true

      - name: Upload complexity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complexity-reports
          path: |
            radon-cc-report.json
            radon-mi-report.json
          retention-days: 30

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install build tools
        run: |
          pip install build twine

      - name: Build distribution packages
        run: |
          python -m build

      - name: Check distribution packages
        run: |
          twine check dist/*

      - name: Upload distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [quality, complexity, build]
    if: always()
    
    steps:
      - name: Check quality gate status
        run: |
          echo "Quality Gate Results:"
          echo "===================="
          echo "Quality Checks: ${{ needs.quality.result }}"
          echo "Complexity Analysis: ${{ needs.complexity.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed!"
            exit 1
          fi
          
          echo "All quality gates passed!"